<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 6 - Завдання 4</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef4ff; }
        form { width: 620px; max-width: calc(100% - 32px); margin: 40px auto; padding: 24px; background: white; border: 3px solid #24558f; }
        h1 { text-align: center; color: #24558f; }
        fieldset { margin-bottom: 16px; border: 2px solid #24558f; }
        label { display: block; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        input[type="radio"], input[type="checkbox"] { width: auto; }
        button { padding: 10px 18px; font-weight: bold; }
    </style>
</head>
<body>
    <form onsubmit="return registerUser()">
        <h1>Реєстрація нового користувача</h1>
        <fieldset>
            <legend>Реєстраційні дані</legend>
            <label>Логін <input type="text" id="login" required></label>
            <label>Пароль <input type="password" id="password" required></label>
            <label>Повторіть пароль <input type="password" id="password2" required></label>
            <label>E-mail <input type="email" id="email" required></label>
        </fieldset>
        <fieldset>
            <legend>Персональні дані</legend>
            <label>Прізвище та ім'я <input type="text" id="fullname" required></label>
            <label>Стать <select><option>Жіноча</option><option>Чоловіча</option></select></label>
            <label>Дата народження <input type="date"></label>
            <label>Про себе <textarea rows="4"></textarea></label>
            <label><input type="checkbox" id="agree"> Погоджуюсь з умовами реєстрації</label>
        </fieldset>
        <button type="submit">Зареєструватися</button>
        <button type="reset">Очистити</button>
    </form>
    <script>
        function registerUser() {
            if (document.getElementById('password').value !== document.getElementById('password2').value) {
                alert('Паролі не співпадають!');
                return false;
            }
            if (!document.getElementById('agree').checked) {
                alert('Потрібно погодитися з умовами реєстрації!');
                return false;
            }
            alert('Користувача зареєстровано!');
            return false;
        }
    </script>
</body>
</html>
