<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 6 - Завдання 5</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fbff; }
        form { width: 430px; margin: 70px auto; padding: 24px; background: white; border: 3px solid #24558f; }
        h1 { text-align: center; color: #24558f; }
        input { width: 100%; margin: 8px 0 16px; padding: 9px; box-sizing: border-box; }
        button { padding: 10px 16px; font-weight: bold; }
    </style>
</head>
<body>
    <form name="sumForm">
        <h1>Обчислення суми двох чисел</h1>
        <label>Перше число <input type="text" name="a" value="0"></label>
        <label>Друге число <input type="text" name="b" value="0"></label>
        <label>Результат <input type="text" name="result" readonly></label>
        <button type="button" onclick="calculateSum()">Обчислити</button>
        <button type="reset">Очистити</button>
    </form>
    <script>
        function calculateSum() {
            var a = parseFloat(document.sumForm.a.value);
            var b = parseFloat(document.sumForm.b.value);
            if (isNaN(a) || isNaN(b)) {
                alert('Введіть числа!');
                return;
            }
            var sum = a + b;
            document.sumForm.result.value = sum;
            alert('Сума чисел дорівнює ' + sum);
        }
    </script>
</body>
</html>
